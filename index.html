                <div className="pill-row">{interestItems.map((item, i) => <Pill text={item.text} icon={item.icon} key={i} />)}</div>
              </div>
            </Section>

            <Section title={text.sections.contact} id="contact">
              <div className="contact-card">
                <div className="contact-grid">
                  <div className="contact-item">
                    <span className="contact-item__icon contact-item__icon--pin"></span>
                    <div>
                      <p className="contact-item__label">{text.contact.locationLabel}</p>
                      <p className="contact-item__value">{text.contact.location}</p>
                    </div>
                  </div>
                  <a className="contact-item" href="https://www.linkedin.com/in/li-fan-zhao/" target="_blank" rel="noreferrer">
                    <span className="contact-item__icon">in</span>
                    <div>
                      <p className="contact-item__label">{text.contact.linkedin}</p>
                      <p className="contact-item__value">li-fan-zhao</p>
                    </div>
                  </a>
                </div>
              </div>
            </Section>
          </main>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
